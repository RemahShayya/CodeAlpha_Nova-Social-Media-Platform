<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot password · Nova</title>
  <link rel="icon" href="../assets/nova-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body class="orbit-bg">
  <div class="page-root auth-page">
    <div class="auth-card">
      <img src="../assets/nova-logo.png" alt="Nova" class="auth-logo">
      <h1 class="auth-title">Reset your password</h1>
      <p class="auth-subtitle">Enter your email and we'll send you a reset link</p>

      <form id="forgot-form" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" autocomplete="email" placeholder="you@example.com">
          <div class="field-error"></div>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Send reset link</button>
      </form>

      <div id="forgot-success" class="status-panel hidden">
        <div class="status-icon">📨</div>
        <h2>Link sent</h2>
        <p>If an account exists for that email, a password reset link is on its way.</p>
        <a href="login.html" class="btn btn-secondary">Back to login</a>
      </div>

      <div class="auth-links" id="forgot-links">
        Remembered it? <a href="login.html">Log in</a>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/validation.js"></script>
  <script>
    $(() => {
      if (redirectIfLoggedIn()) return;

      $('#forgot-form').on('submit', function (e) {
        e.preventDefault();
        const $form = $(this);
        clearAllErrors($form);

        const $email = $('#email');
        if (!validateEmailField($email)) return;

        const $btn = $form.find('button[type=submit]');
        btnLoading($btn, true);

        // Backend always answers generically — mirror that here.
        apiForgotPassword($email.val().trim())
          .then(() => {
            $form.addClass('hidden');
            $('#forgot-links').addClass('hidden');
            $('#forgot-success').removeClass('hidden');
          })
          .catch((err) => {
            btnLoading($btn, false);
            showToast(err.message, 'error');
          });
      });
    });
  </script>
</body>
</html>
