<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set new password · Nova</title>
  <link rel="icon" href="../assets/nova-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body class="orbit-bg">
  <div class="page-root auth-page">
    <div class="auth-card">
      <img src="../assets/nova-logo.png" alt="Nova" class="auth-logo">
      <h1 class="auth-title">Set a new password</h1>
      <p class="auth-subtitle">Choose a strong password for your account</p>

      <!-- Missing token -->
      <div id="no-token" class="status-panel hidden">
        <div class="status-icon">⚠️</div>
        <h2>Invalid link</h2>
        <p>This reset link is missing its token. Request a new one below.</p>
        <a href="forgot-password.html" class="btn btn-primary">Request new link</a>
      </div>

      <form id="reset-form" novalidate>
        <div class="form-group">
          <label for="password">New password</label>
          <div class="password-wrap">
            <input type="password" id="password" autocomplete="new-password" placeholder="At least 8 characters">
            <button type="button" class="password-toggle" aria-label="Show password">👁</button>
          </div>
          <div class="field-error"></div>
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm new password</label>
          <div class="password-wrap">
            <input type="password" id="confirm-password" autocomplete="new-password" placeholder="Repeat your password">
            <button type="button" class="password-toggle" aria-label="Show password">👁</button>
          </div>
          <div class="field-error"></div>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Reset password</button>
      </form>

      <div id="reset-success" class="status-panel hidden">
        <div class="status-icon">✅</div>
        <h2>Password updated</h2>
        <p>Redirecting you to login…</p>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/validation.js"></script>
  <script>
    $(() => {
      bindPasswordToggles();
      const token = getQueryParam('token');

      if (!token) {
        $('#reset-form').addClass('hidden');
        $('#no-token').removeClass('hidden');
        return;
      }

      $('#reset-form').on('submit', function (e) {
        e.preventDefault();
        const $form = $(this);
        clearAllErrors($form);

        const $password = $('#password');
        const $confirm = $('#confirm-password');

        const ok = [
          validatePasswordField($password, 8),
          validatePasswordsMatch($password, $confirm),
        ].every(Boolean);
        if (!ok) return;

        const $btn = $form.find('button[type=submit]');
        btnLoading($btn, true);

        apiResetPassword(token, $password.val())
          .then(() => {
            $form.addClass('hidden');
            $('#reset-success').removeClass('hidden');
            setTimeout(() => { window.location.href = 'login.html'; }, 2000);
          })
          .catch((err) => {
            btnLoading($btn, false);
            showToast(err.message, 'error');
          });
      });
    });
  </script>
</body>
</html>
