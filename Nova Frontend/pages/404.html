<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Not found · Nova</title>
  <link rel="icon" href="../assets/nova-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body class="orbit-bg">
  <div class="page-root auth-page">
    <div class="auth-card text-center">
      <h1 class="gradient-text" style="font-size: 4.5rem; margin-bottom: var(--space-2);">404</h1>
      <h2 style="margin-bottom: var(--space-3);">Lost in space</h2>
      <p class="text-muted" style="margin-bottom: var(--space-8);">This page drifted out of orbit. Let's get you back home.</p>
      <a href="#" id="home-link" class="btn btn-primary">Back to Nova</a>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    $(() => {
      $('#home-link').attr('href', isLoggedIn() ? (isAdmin() ? 'admin/dashboard.html' : 'feed.html') : 'login.html');
    });
  </script>
</body>
</html>
