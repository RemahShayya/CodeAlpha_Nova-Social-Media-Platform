<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create admin · Nova Admin</title>
  <link rel="icon" href="../../assets/nova-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/pages.css">
  <link rel="stylesheet" href="../../css/responsive.css">
</head>
<body>
  <header id="app-navbar"></header>

  <main class="main-content page-root">
    <h1 class="page-title">Create admin</h1>
    <div id="admin-tabs"></div>

    <form id="create-admin-form" class="card" novalidate>
      <div class="form-group">
        <label for="name">Full name</label>
        <input type="text" id="name" maxlength="50" placeholder="Admin name">
        <div class="field-error"></div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="admin@example.com">
        <div class="field-error"></div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-wrap">
          <input type="password" id="password" autocomplete="new-password" placeholder="At least 8 characters">
          <button type="button" class="password-toggle" aria-label="Show password">👁</button>
        </div>
        <div class="field-error"></div>
      </div>

      <div class="form-group">
        <label for="confirm-password">Confirm password</label>
        <div class="password-wrap">
          <input type="password" id="confirm-password" autocomplete="new-password" placeholder="Repeat the password">
          <button type="button" class="password-toggle" aria-label="Show password">👁</button>
        </div>
        <div class="field-error"></div>
      </div>

      <button type="submit" class="btn btn-primary btn-block">Create admin account</button>
    </form>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/ui.js"></script>
  <script src="../../js/api.js"></script>
  <script src="../../js/validation.js"></script>
  <script src="../../js/admin.js"></script>
  <script>
    $(() => {
      if (!requireAdmin()) return;
      renderAdminNav('create-admin');
      bindPasswordToggles();

      $('#create-admin-form').on('submit', function (e) {
        e.preventDefault();
        const $form = $(this);
        clearAllErrors($form);

        const $name = $('#name');
        const $email = $('#email');
        const $password = $('#password');
        const $confirm = $('#confirm-password');

        const ok = [
          validateRequired($name, 'Name'),
          validateEmailField($email),
          validatePasswordField($password, 8),
          validatePasswordsMatch($password, $confirm),
        ].every(Boolean);
        if (!ok) return;

        const $btn = $form.find('button[type=submit]');
        btnLoading($btn, true);

        apiCreateAdmin($name.val().trim(), $email.val().trim(), $password.val())
          .then(() => {
            $form[0].reset();
            showToast('Admin account created.', 'success');
          })
          .catch((err) => showToast(err.message, 'error'))
          .finally(() => btnLoading($btn, false));
      });
    });
  </script>
</body>
</html>
