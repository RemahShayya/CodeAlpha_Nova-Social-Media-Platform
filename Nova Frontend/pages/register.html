<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create account · Nova</title>
  <link rel="icon" href="../assets/nova-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body class="orbit-bg">
  <div class="page-root auth-page">
    <div class="auth-card">
      <img src="../assets/nova-logo.png" alt="Nova" class="auth-logo">
      <h1 class="auth-title">Join Nova</h1>
      <p class="auth-subtitle">Create your account to get started</p>

      <form id="register-form" novalidate>
        <div class="form-group">
          <label for="name">Full name</label>
          <input type="text" id="name" autocomplete="name" maxlength="50" placeholder="Your name">
          <div class="field-error"></div>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" autocomplete="email" placeholder="you@example.com">
          <div class="field-error"></div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrap">
            <input type="password" id="password" autocomplete="new-password" placeholder="At least 8 characters">
            <button type="button" class="password-toggle" aria-label="Show password">👁</button>
          </div>
          <div class="field-error"></div>
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm password</label>
          <div class="password-wrap">
            <input type="password" id="confirm-password" autocomplete="new-password" placeholder="Repeat your password">
            <button type="button" class="password-toggle" aria-label="Show password">👁</button>
          </div>
          <div class="field-error"></div>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Create account</button>
      </form>

      <!-- Post-registration success -->
      <div id="register-success" class="status-panel hidden">
        <div class="status-icon">📬</div>
        <h2>Check your email</h2>
        <p>We sent a verification link to your inbox. Verify your email, then log in.</p>
        <a href="login.html" class="btn btn-primary">Go to login</a>
      </div>

      <div class="auth-links" id="register-links">
        Already have an account? <a href="login.html">Log in</a>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/validation.js"></script>
  <script>
    $(() => {
      if (redirectIfLoggedIn()) return;
      bindPasswordToggles();

      $('#register-form').on('submit', function (e) {
        e.preventDefault();
        const $form = $(this);
        clearAllErrors($form);

        const $name = $('#name');
        const $email = $('#email');
        const $password = $('#password');
        const $confirm = $('#confirm-password');

        const ok = [
          validateRequired($name, 'Name'),
          validateEmailField($email),
          validatePasswordField($password, 8),
          validatePasswordsMatch($password, $confirm),
        ].every(Boolean);
        if (!ok) return;

        const $btn = $form.find('button[type=submit]');
        btnLoading($btn, true);

        apiRegister($name.val().trim(), $email.val().trim(), $password.val())
          .then(() => {
            $form.addClass('hidden');
            $('#register-links').addClass('hidden');
            $('#register-success').removeClass('hidden');
          })
          .catch((err) => {
            btnLoading($btn, false);
            showToast(err.message, 'error');
          });
      });
    });
  </script>
</body>
</html>
